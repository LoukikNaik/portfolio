<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    display: flex;
    align-items: center;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    color: #f8fafc;
    overflow: hidden;
    position: relative;
  }
  .glow-1 {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(14,165,233,0.12) 0%, transparent 70%);
    top: -150px;
    right: -100px;
  }
  .glow-2 {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(6,182,212,0.08) 0%, transparent 70%);
    bottom: -120px;
    left: -80px;
  }
  .card {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 50px;
    padding: 0 80px;
    width: 100%;
  }
  .photo-wrap {
    flex-shrink: 0;
    position: relative;
  }
  .photo-wrap::before {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(14,165,233,0.3), rgba(6,182,212,0.1));
    z-index: -1;
  }
  .photo {
    width: 240px;
    height: 240px;
    border-radius: 50%;
    border: 3px solid rgba(14,165,233,0.3);
    object-fit: cover;
  }
  .text {
    flex: 1;
  }
  .text h1 {
    font-size: 62px;
    font-weight: 700;
    letter-spacing: -2px;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #0ea5e9, #06b6d4);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .text h2 {
    font-size: 28px;
    font-weight: 400;
    color: #94a3b8;
    margin-bottom: 20px;
  }
  .text p {
    font-size: 20px;
    color: #64748b;
    line-height: 1.6;
  }
  .tags {
    display: flex;
    gap: 10px;
    margin-top: 24px;
    flex-wrap: wrap;
  }
  .tag {
    padding: 6px 16px;
    border-radius: 20px;
    background: rgba(14,165,233,0.1);
    border: 1px solid rgba(14,165,233,0.2);
    color: #0ea5e9;
    font-size: 14px;
    font-weight: 500;
  }
  .domain {
    position: absolute;
    bottom: 30px;
    right: 60px;
    font-size: 20px;
    color: #334155;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="card">
    <div class="photo-wrap">
      <img class="photo" src="../src/assets/loukik.jpeg" alt="">
    </div>
    <div class="text">
      <h1>Loukik Naik</h1>
      <h2>Software Engineer</h2>
      <p>Backend systems, AI infrastructure, computer vision, and production ML.</p>
      <div class="tags">
        <span class="tag">Python</span>
        <span class="tag">Go</span>
        <span class="tag">Kubernetes</span>
        <span class="tag">Computer Vision</span>
        <span class="tag">LLMs</span>
      </div>
    </div>
  </div>
  <div class="domain">loukik.dev</div>
</body>
</html>
